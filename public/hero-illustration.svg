  <!-- Rechter Arm -->
  <path d="M149 250 Q170 265 178 278" stroke="#C4714F" stroke-width="8" stroke-linecap="round" opacity="0.22"/>
  <!-- Beine -->
  <rect x="110" y="308" width="16" height="46" rx="8" fill="#C4714F" opacity="0.15"/>
  <rect x="134" y="308" width="16" height="46" rx="8" fill="#C4714F" opacity="0.15"/>

