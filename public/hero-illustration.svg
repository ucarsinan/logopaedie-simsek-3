  <circle cx="50" cy="344" r="6.5" fill="#C4714F" opacity="0.18"/>
  <circle cx="66" cy="368" r="4.5" fill="#2A7F6F" opacity="0.15"/>
  <circle cx="44" cy="385" r="3.5" fill="#C4714F" opacity="0.12"/>

  <!-- Unten rechts -->
  <circle cx="430" cy="348" r="5.5" fill="#2A7F6F" opacity="0.18"/>
  <circle cx="448" cy="370" r="3.5" fill="#C4714F" opacity="0.15"/>
  <circle cx="434" cy="388" r="6" fill="#2A7F6F" opacity="0.12"/>

</svg>
