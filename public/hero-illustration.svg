  <path d="M48 78 L48 90 M42 84 L54 84" stroke="#2A7F6F" stroke-width="2.8" stroke-linecap="round" opacity="0.28"/>
  <path d="M62 60 L62 68 M58 64 L66 64" stroke="#C4714F" stroke-width="2" stroke-linecap="round" opacity="0.22"/>

