  <rect x="220" y="104" width="54" height="6" rx="3" fill="#2A7F6F" opacity="0.26"/>
  <rect x="220" y="116" width="62" height="6" rx="3" fill="#2A7F6F" opacity="0.20"/>

  <!-- Verbindungslinie Therapeutin ↔ Kind -->
  <path d="M152 286 Q240 265 320 275" stroke="#2A7F6F" stroke-width="1.5" stroke-dasharray="6 4" stroke-linecap="round" opacity="0.18"/>

  <!-- ═══ FORTSCHRITT / VERTRAUEN (unten) ═══ -->
  <!-- Checkmark-Badge Mitte -->
  <circle cx="240" cy="410" r="30" fill="#2A7F6F" opacity="0.09"/>
  <circle cx="240" cy="410" r="21" fill="#2A7F6F" opacity="0.14"/>
  <path d="M228 410 L237 419 L254 399" stroke="#2A7F6F" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.72"/>

