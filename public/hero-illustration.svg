  <rect x="189" y="152" width="8" height="64" rx="4" fill="#C4714F" opacity="0.55"/>
  <rect x="204" y="157" width="8" height="54" rx="4" fill="#C4714F" opacity="0.47"/>
  <rect x="219" y="164" width="8" height="40" rx="4" fill="#C4714F" opacity="0.36"/>
  <rect x="234" y="154" width="8" height="60" rx="4" fill="#C4714F" opacity="0.52"/>
  <rect x="249" y="160" width="8" height="48" rx="4" fill="#C4714F" opacity="0.42"/>
  <rect x="264" y="165" width="8" height="38" rx="4" fill="#C4714F" opacity="0.34"/>
  <rect x="279" y="155" width="8" height="58" rx="4" fill="#C4714F" opacity="0.48"/>

