<!-- Emel Şimşek-Uçar – Praxisleitung / dark warm-brown hair in bun -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="#DCF0EC"/>

  <!-- Shirt / body (drawn first, behind neck/face) -->
  <path d="M 28 200 L 22 162 Q 36 144 100 144 Q 164 144 178 162 L 172 200 Z" fill="#2A7F6F"/>
  <!-- Collar V -->
  <path d="M 84 150 L 100 170 L 116 150" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.45"/>

  <!-- Neck -->
  <rect x="87" y="138" width="26" height="24" rx="7" fill="#C9906A"/>

  <!-- Face -->
  <ellipse cx="100" cy="106" rx="44" ry="47" fill="#D4956E"/>

  <!-- Hair – bun style -->
  <!-- Top/crown fill -->
  <ellipse cx="100" cy="74"  rx="44" ry="33" fill="#4A2A0A"/>
  <!-- Side hair panels -->
  <rect x="56"  y="70"  width="16" height="46" rx="8" fill="#4A2A0A"/>
  <rect x="128" y="70"  width="16" height="46" rx="8" fill="#4A2A0A"/>
  <!-- Hairline bar across top of face -->
  <rect x="56"  y="68"  width="88" height="20" rx="0" fill="#4A2A0A"/>
  <!-- Bun circle (top-right of head) -->
  <circle cx="136" cy="62" r="18" fill="#4A2A0A"/>
  <circle cx="136" cy="62" r="11" fill="#5C3614"/>

  <!-- Eyes -->
  <ellipse cx="86"  cy="105" rx="4" ry="4.5" fill="#2D1508"/>
  <ellipse cx="114" cy="105" rx="4" ry="4.5" fill="#2D1508"/>
  <!-- Eye shine -->
  <circle cx="88"  cy="103" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="116" cy="103" r="1.5" fill="white" opacity="0.7"/>

  <!-- Eyebrows -->
  <path d="M 80 96 Q 86 92 92 95"  stroke="#3A2008" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M 108 95 Q 114 92 120 96" stroke="#3A2008" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Subtle smile line -->
  <path d="M 91 124 Q 100 130 109 124" stroke="#B87050" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.5"/>

  <!-- Badge accent dot (top-right) -->
  <circle cx="158" cy="38" r="12" fill="#2A7F6F" opacity="0.25"/>
  <circle cx="158" cy="38" r="7"  fill="#2A7F6F" opacity="0.5"/>
</svg>
