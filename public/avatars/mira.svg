<!-- Mira A. – auburn/reddish-brown, slightly wavy/fuller hair -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="#FDF0E6"/>

  <!-- Shirt / body -->
  <path d="M 28 200 L 22 162 Q 36 144 100 144 Q 164 144 178 162 L 172 200 Z" fill="#2A7F6F"/>
  <path d="M 84 150 L 100 168 L 116 150" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>

  <!-- Wavy side hair (wider, behind face) -->
  <ellipse cx="58"  cy="108" rx="16" ry="28" fill="#8B3A14"/>
  <ellipse cx="142" cy="108" rx="16" ry="28" fill="#8B3A14"/>

  <!-- Neck -->
  <rect x="87" y="138" width="26" height="24" rx="7" fill="#C9906A"/>

  <!-- Face -->
  <ellipse cx="100" cy="106" rx="44" ry="47" fill="#D4956E"/>

  <!-- Hair crown – fuller / slightly wavy feel with wider ellipse -->
  <ellipse cx="100" cy="70" rx="50" ry="34" fill="#8B3A14"/>
  <rect x="55"  y="66" width="90" height="22" rx="0" fill="#8B3A14"/>
  <!-- Loose wave bump on left -->
  <ellipse cx="62" cy="82" rx="14" ry="20" fill="#8B3A14"/>
  <!-- And right -->
  <ellipse cx="138" cy="82" rx="14" ry="20" fill="#8B3A14"/>

  <!-- Eyes -->
  <ellipse cx="86"  cy="105" rx="4" ry="4.5" fill="#2D1006"/>
  <ellipse cx="114" cy="105" rx="4" ry="4.5" fill="#2D1006"/>
  <circle cx="88"  cy="103" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="116" cy="103" r="1.5" fill="white" opacity="0.7"/>

  <path d="M 80 96 Q 86 92 92 95"  stroke="#4A2010" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M 108 95 Q 114 92 120 96" stroke="#4A2010" stroke-width="2" stroke-linecap="round" fill="none"/>

  <path d="M 91 124 Q 100 130 109 124" stroke="#B87050" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.5"/>

  <!-- Accent dot -->
  <circle cx="158" cy="38" r="10" fill="#8B3A14" opacity="0.18"/>
  <circle cx="158" cy="38" r="5"  fill="#8B3A14" opacity="0.35"/>
</svg>
