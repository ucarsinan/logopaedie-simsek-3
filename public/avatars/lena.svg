<!-- Lena K. – very dark brown/almost black, straight medium length hair -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="#E8F4F2"/>

  <!-- Shirt / body -->
  <path d="M 28 200 L 22 162 Q 36 144 100 144 Q 164 144 178 162 L 172 200 Z" fill="#C4714F"/>
  <path d="M 84 150 L 100 168 L 116 150" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>

  <!-- Shoulder-length dark hair (behind everything) -->
  <rect x="55"  y="78"  width="18" height="72" rx="9" fill="#211208"/>
  <rect x="127" y="78"  width="18" height="72" rx="9" fill="#211208"/>

  <!-- Neck -->
  <rect x="87" y="138" width="26" height="24" rx="7" fill="#C9906A"/>

  <!-- Face -->
  <ellipse cx="100" cy="106" rx="44" ry="47" fill="#D4956E"/>

  <!-- Hair crown -->
  <ellipse cx="100" cy="72" rx="44" ry="33" fill="#211208"/>
  <rect x="55"  y="68" width="90" height="20" rx="0" fill="#211208"/>

  <!-- Eyes -->
  <ellipse cx="86"  cy="105" rx="4" ry="4.5" fill="#160C04"/>
  <ellipse cx="114" cy="105" rx="4" ry="4.5" fill="#160C04"/>
  <circle cx="88"  cy="103" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="116" cy="103" r="1.5" fill="white" opacity="0.7"/>

  <path d="M 80 96 Q 86 92 92 95"  stroke="#2A1A08" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M 108 95 Q 114 92 120 96" stroke="#2A1A08" stroke-width="2" stroke-linecap="round" fill="none"/>

  <path d="M 91 124 Q 100 130 109 124" stroke="#B87050" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.5"/>

  <!-- Accent dot -->
  <circle cx="158" cy="38" r="10" fill="#C4714F" opacity="0.2"/>
  <circle cx="158" cy="38" r="5"  fill="#C4714F" opacity="0.4"/>
</svg>
